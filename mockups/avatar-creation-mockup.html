<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Renter's Journey · Build Your Renter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;0,700;1,400&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --indigo: #6105C4;
    --indigo-deep: #46137B;
    --oat: #F5F2ED;
    --oat-warm: #EFE6D6;
    --paper: #FFFCF0;
    --light-purple: #C384F0;
    --lavender: #D7C6F1;
    --orange: #FF974D;
    --red: #FF0029;
    --ink: #2D1B0E;
    --ink-soft: #5D4037;
    --grass: #7AAB58;
    --grass-dark: #5C8841;
    --tree: #3D5A3D;
    --tree-light: #6B9E67;
    --bark: #5D4037;
    --sky-top: #FFE4C7;
    --sky-mid: #F5C6D6;
    --sky-low: #D7C6F1;

    /* Avatar customization variables (default Alex-ish look) */
    --avatar-skin: #E8C5A4;
    --avatar-hair: #3B2A1F;
    --avatar-lip: #C8576B;
    --avatar-shirt: #6105C4;
    --avatar-pants: #3B2A4F;
    --avatar-shoes: #1A0E2E;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 35%, var(--sky-low) 65%, var(--oat) 100%);
    color: var(--ink);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 16px;
    line-height: 1.5;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* Oat translucency overlay (matches persona-selection scrolled-in state)
     — softens sunset behind content so avatar UI doesn't compete with the backdrop */
  .bg-fade {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: linear-gradient(180deg,
      rgba(245, 242, 237, 0) 0%,
      rgba(245, 242, 237, 0.78) 35%,
      rgba(245, 242, 237, 0.92) 100%);
  }

  /* Town scene anchored at bottom (matches persona selection homepage) */
  .town-scene {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 360px;
    z-index: 0;
    pointer-events: none;
    display: block;
  }

  /* Drifting clouds (3 layers, matches homepage) */
  .clouds {
    position: fixed;
    top: 60px;
    left: 0;
    width: 100%;
    height: 120px;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .cloud {
    position: absolute;
    background: rgba(255, 255, 255, 0.7);
    border-radius: 0;
    animation: float 60s linear infinite;
  }
  .cloud::before, .cloud::after {
    content: "";
    position: absolute;
    background: rgba(255, 255, 255, 0.7);
  }
  .cloud.c1 { width: 80px; height: 16px; top: 20px; left: 10%; animation-duration: 220s; }
  .cloud.c1::before { width: 50px; height: 12px; top: -10px; left: 18px; }
  .cloud.c1::after { width: 30px; height: 8px; top: -16px; left: 35px; }
  .cloud.c2 { width: 60px; height: 14px; top: 80px; left: 50%; animation-duration: 280s; animation-delay: -60s; }
  .cloud.c2::before { width: 40px; height: 10px; top: -8px; left: 14px; }
  .cloud.c3 { width: 100px; height: 18px; top: 40px; left: 80%; animation-duration: 250s; animation-delay: -120s; }
  .cloud.c3::before { width: 70px; height: 14px; top: -12px; left: 20px; }
  .cloud.c3::after { width: 40px; height: 10px; top: -20px; left: 45px; }

  @keyframes float {
    0%   { transform: translateX(0); }
    100% { transform: translateX(120vw); }
  }

  /* Bird flying across (matches homepage) */
  .bird {
    position: fixed;
    top: 120px;
    left: -40px;
    z-index: 2;
    pointer-events: none;
    animation: fly 35s linear infinite;
    animation-delay: 3s;
  }

  @keyframes fly {
    0%   { transform: translate(0, 0); opacity: 0; }
    3%   { opacity: 1; }
    25%  { transform: translate(30vw, -25px); }
    50%  { transform: translate(60vw, 5px); }
    75%  { transform: translate(90vw, -15px); }
    97%  { opacity: 1; }
    100% { transform: translate(115vw, 0); opacity: 0; }
  }

  /* Stage layout */
  .stage {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    padding: 48px 32px 420px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .persona-context {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 6px 14px;
    margin-bottom: 16px;
    box-shadow: 3px 3px 0 var(--ink-soft);
  }

  .persona-context .label {
    font-family: 'VT323', monospace;
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .persona-context .name {
    font-family: 'Pixelify Sans', monospace;
    font-size: 16px;
    color: var(--indigo);
  }

  .persona-context .change {
    font-family: 'VT323', monospace;
    font-size: 14px;
    color: var(--ink-soft);
    text-decoration: none;
    border-left: 2px dotted var(--ink-soft);
    padding-left: 10px;
    margin-left: 4px;
    cursor: pointer;
  }
  .persona-context .change:hover { color: var(--indigo); }

  h1.title {
    font-family: 'Pixelify Sans', monospace;
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 600;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -1px;
    margin-bottom: 12px;
    text-shadow: 4px 4px 0 rgba(45, 27, 14, 0.08);
  }

  h1.title .accent { color: var(--indigo); }

  .subtitle {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: clamp(16px, 1.5vw, 20px);
    color: var(--ink-soft);
    max-width: 540px;
    margin: 0 auto;
  }

  .pixel-divider {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin: 24px 0;
  }
  .pixel-divider span {
    width: 8px; height: 8px;
    background: var(--indigo);
  }
  .pixel-divider span:nth-child(2) { background: var(--light-purple); }
  .pixel-divider span:nth-child(3) { background: var(--orange); }
  .pixel-divider span:nth-child(4) { background: var(--red); }
  .pixel-divider span:nth-child(5) { background: var(--ink); }

  /* Main two-column creator layout */
  .creator {
    display: grid;
    grid-template-columns: minmax(280px, 380px) 1fr;
    gap: 32px;
    align-items: start;
  }

  /* Avatar preview card */
  .preview-card {
    background: var(--paper);
    border: 3px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink-soft);
    padding: 24px;
    position: sticky;
    top: 24px;
  }

  .preview-card::before {
    content: "";
    display: block;
    height: 8px;
    background: var(--indigo);
    margin: -24px -24px 16px;
  }

  .avatar-frame {
    aspect-ratio: 3 / 4;
    background: linear-gradient(180deg, #FFE8C2 0%, #F5C6D6 70%, #D7C6F1 100%);
    border: 3px solid var(--ink);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Pixel grass at bottom of avatar frame */
  .avatar-frame::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 16px;
    background: var(--grass);
    border-top: 2px solid var(--grass-dark);
  }

  .avatar {
    width: 70%;
    height: auto;
    z-index: 2;
    margin-bottom: 12px;
    image-rendering: pixelated;
    filter: drop-shadow(2px 2px 0 rgba(45, 27, 14, 0.25));
  }

  .preview-label {
    text-align: center;
    margin-top: 14px;
    font-family: 'Pixelify Sans', monospace;
    font-size: 18px;
    color: var(--ink);
    letter-spacing: 0.5px;
  }

  .preview-label .pixel-tag {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--indigo);
    margin-right: 6px;
    transform: translateY(-1px);
  }

  /* Customization controls */
  .controls {
    background: var(--paper);
    border: 3px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink-soft);
    padding: 24px;
    position: relative;
  }

  .controls::before {
    content: "";
    display: block;
    height: 8px;
    background: var(--orange);
    margin: -24px -24px 18px;
  }

  .control-group {
    margin-bottom: 20px;
    padding-bottom: 18px;
    border-bottom: 2px dashed var(--lavender);
  }
  .control-group:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }

  .control-group h3 {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--ink);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .control-group h3::before {
    content: "";
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--indigo);
  }

  /* Swatches (color choices) */
  .swatches {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .swatch {
    width: 38px;
    height: 38px;
    border: 2px solid var(--ink);
    cursor: pointer;
    background: var(--swatch-color, #ccc);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    position: relative;
    padding: 0;
  }

  .swatch:hover {
    transform: translate(-2px, -2px);
    box-shadow: 3px 3px 0 var(--ink-soft);
  }

  .swatch.selected {
    box-shadow: 0 0 0 3px var(--paper), 0 0 0 5px var(--ink);
  }

  .swatch.selected::after {
    content: "";
    position: absolute;
    bottom: -10px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-bottom: 4px solid var(--ink);
  }

  /* Hair style thumbnails */
  .thumbs {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .thumb {
    width: 56px;
    height: 56px;
    background: var(--oat-warm);
    border: 2px solid var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    padding: 4px;
  }

  .thumb:hover {
    transform: translate(-2px, -2px);
    box-shadow: 3px 3px 0 var(--ink-soft);
  }

  .thumb.selected {
    background: var(--lavender);
    box-shadow: inset 0 0 0 2px var(--indigo);
  }

  .thumb svg {
    width: 100%;
    height: 100%;
  }

  /* Toggle row (general purpose) */
  .toggle-row {
    display: flex;
    gap: 8px;
  }

  .toggle {
    flex: 1;
    padding: 10px 14px;
    border: 2px solid var(--ink);
    background: var(--oat-warm);
    cursor: pointer;
    font-family: 'Pixelify Sans', monospace;
    font-size: 14px;
    color: var(--ink);
    transition: all 0.12s ease;
  }

  .toggle:hover {
    background: var(--lavender);
  }

  .toggle.selected {
    background: var(--indigo);
    color: var(--paper);
    box-shadow: inset 2px 2px 0 var(--indigo-deep);
  }

  /* CTA */
  .cta-row {
    margin-top: 36px;
    text-align: center;
    position: relative;
    z-index: 3;
  }

  .btn-begin {
    padding: 16px 40px;
    background: var(--indigo);
    color: var(--paper);
    border: 3px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink);
    font-family: 'Pixelify Sans', monospace;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .btn-begin:hover {
    transform: translate(-3px, -3px);
    box-shadow: 9px 9px 0 var(--ink);
  }
  .btn-begin:active {
    transform: translate(3px, 3px);
    box-shadow: 0 0 0 var(--ink);
  }

  /* Sparkle helper for CTA */
  .btn-begin .sp {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--orange);
    margin: 0 8px;
    transform: translateY(-3px);
  }

  /* Mobile */
  @media (max-width: 880px) {
    .creator { grid-template-columns: 1fr; }
    .preview-card { position: relative; top: 0; }
    .avatar-frame { max-width: 320px; margin: 0 auto; }
    .stage { padding: 32px 16px 320px; }
    .town-scene { height: 240px; }
  }

  /* Lantern flicker */
  @keyframes flicker {
    0%, 100% { opacity: 0.7; }
    50%      { opacity: 1; }
  }
</style>
</head>

    <!-- decorative dentils -->

<script>
  // Map color targets to CSS variables on the avatar
  const targetVars = {
    skin: '--avatar-skin',
    hair: '--avatar-hair',
    shirt: '--avatar-shirt',
    pants: '--avatar-pants',
    shoes: '--avatar-shoes',
  };

  // Lip color paired with each skin tone (more saturated for visibility against the skin)
  const skinToLip = {
    '#FCE0C2': '#E07590',  // pale: bright pink
    '#E8C5A4': '#C8576B',  // medium fair: rose
    '#D4A57A': '#A8425A',  // medium: dusty rose
    '#A87A52': '#8B3548',  // medium-deep: berry
    '#7A5236': '#8B3548',  // deep: berry, lifted for visibility
    '#4A3220': '#B85968'   // very deep: rose-berry, lifted for clear contrast
  };

  // Wire up color swatches
  document.querySelectorAll('.swatches').forEach(group => {
    const target = group.dataset.target;
    group.querySelectorAll('.swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        // Toggle selected state
        group.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
        swatch.classList.add('selected');
        // Apply color to avatar
        const color = swatch.dataset.color;
        document.documentElement.style.setProperty(targetVars[target], color);
        // When skin tone changes, also adjust the lip color so the smile stays harmonious
        if (target === 'skin' && skinToLip[color]) {
          document.documentElement.style.setProperty('--avatar-lip', skinToLip[color]);
        }
      });
    });
  });

  // Wire up hair style thumbs
  document.querySelectorAll('.thumbs[data-target="hair-style"] .thumb').forEach(thumb => {
    thumb.addEventListener('click', () => {
      document.querySelectorAll('.thumbs[data-target="hair-style"] .thumb').forEach(t => t.classList.remove('selected'));
      thumb.classList.add('selected');
      const style = thumb.dataset.style;
      // Hide all hair styles, show selected
      document.querySelectorAll('.avatar .hair-style').forEach(g => {
        g.style.display = (g.dataset.style === style) ? '' : 'none';
      });
    });
  });

  // Begin button (decorative for the mockup)
  document.querySelector('.btn-begin').addEventListener('click', () => {
    alert('The Long Night begins. (Mockup: this would navigate to Chapter 1)');
  });
</script>
